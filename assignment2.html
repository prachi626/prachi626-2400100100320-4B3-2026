<!DOCTYPE html>
<html>
<head>
<title>Basic Calculator</title>
</head>

<body style="font-family:Arial; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:#333; padding:20px; border-radius:10px; width:260px;">

<input id="display" type="text"
style="width:100%; height:50px; font-size:20px; margin-bottom:10px; text-align:right; padding-right:10px; border-radius:5px; border:none;">

<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">

<button onclick="clearDisplay()" style="padding:15px;background:red;color:white;border:none;border-radius:5px;">C</button>
<button onclick="press('/')" style="padding:15px;">/</button>
<button onclick="press('*')" style="padding:15px;">*</button>
<button onclick="press('-')" style="padding:15px;">-</button>

<button onclick="press('7')" style="padding:15px;">7</button>
<button onclick="press('8')" style="padding:15px;">8</button>
<button onclick="press('9')" style="padding:15px;">9</button>
<button onclick="press('+')" style="padding:15px;">+</button>

<button onclick="press('4')" style="padding:15px;">4</button>
<button onclick="press('5')" style="padding:15px;">5</button>
<button onclick="press('6')" style="padding:15px;">6</button>
<button onclick="calculate()" style="padding:15px;background:green;color:white;border:none;border-radius:5px;">=</button>

<button onclick="press('1')" style="padding:15px;">1</button>
<button onclick="press('2')" style="padding:15px;">2</button>
<button onclick="press('3')" style="padding:15px;">3</button>
<button onclick="press('0')" style="padding:15px;">0</button>

<button onclick="press('.')" style="padding:15px;">.</button>

</div>
</div>

<script>
function press(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){
try{
document.getElementById("display").value =
eval(document.getElementById("display").value);
}
catch{
document.getElementById("display").value="Error";
}
}
</script>

</body>
</html>
